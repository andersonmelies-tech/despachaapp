<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0a500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e08800;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff8e1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Fundo quadrado arredondado -->
  <rect x="10" y="10" width="180" height="180" rx="36" ry="36" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Seta de despacho (avançando para direita) -->
  <g transform="translate(100,100)">
    <!-- Corpo da seta -->
    <rect x="-52" y="-14" width="72" height="28" rx="6" fill="white" opacity="0.95"/>
    <!-- Ponta da seta -->
    <polygon points="22,-28 62,0 22,28" fill="white" opacity="0.95"/>
    <!-- Linha de velocidade 1 -->
    <rect x="-62" y="-28" width="32" height="7" rx="3.5" fill="white" opacity="0.45"/>
    <!-- Linha de velocidade 2 -->
    <rect x="-68" y="-42" width="22" height="7" rx="3.5" fill="white" opacity="0.28"/>
    <!-- Linha de velocidade 3 -->
    <rect x="-62" y="21" width="32" height="7" rx="3.5" fill="white" opacity="0.45"/>
    <!-- Linha de velocidade 4 -->
    <rect x="-68" y="35" width="22" height="7" rx="3.5" fill="white" opacity="0.28"/>
  </g>
</svg>
